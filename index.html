<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(to right, #f8e1e7, #e6f0ff);
            text-align: center;
            color: #333;
        }
        .container {
            padding: 50px 20px;
        }
        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }
        h2 {
            font-weight: normal;
            margin-bottom: 30px;
        }
        .details {
            background: white;
            padding: 30px;
            margin: 20px auto;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff4d6d;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
        }
        .btn:hover {
            background: #e60039;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>You're Invited 💍</h1>
    <h2>To Celebrate the Wedding of</h2>

    <h1>YOUR NAME & PARTNER NAME</h1>

    <div class="details">
        <p><strong>Date:</strong> 10 December 2026</p>
        <p><strong>Time:</strong> 5:00 PM onwards</p>
        <p><strong>Venue:</strong> Your Venue Name, City</p>
        <p>We would love for you to join us on this special day ❤️</p>
        
        <a href="https://maps.google.com" class="btn">View Location</a>
    </div>
</div>

</body>
</html>
